# .github/workflows/deploy.yml
name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE_NAME: cityfarm-2-0-web
  ADMIN_IMAGE_NAME: cityfarm-2-0-admin
  API_IMAGE_NAME: cityfarm-2-0-api
  MODEL_API_IMAGE_NAME: cityfarm-2-0-model-api
  DEPLOY_PATH: /root/CITYFARM-2.0

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check-types

  build-and-push-web:
    name: Build & push web image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required build secrets
        env:
          WEB_NEXT_PUBLIC_API_URL: ${{ secrets.WEB_NEXT_PUBLIC_API_URL }}
          WEB_NEXT_PUBLIC_APP_URL: ${{ secrets.WEB_NEXT_PUBLIC_APP_URL }}
          NEST_API_URL: ${{ secrets.NEST_API_URL }}
        run: |
          set -euo pipefail
          required_vars=(
            WEB_NEXT_PUBLIC_API_URL
            WEB_NEXT_PUBLIC_APP_URL
            NEST_API_URL
          )
          for var in "${required_vars[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required GitHub secret: $var"
              exit 1
            fi
          done

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE_NAME }}:latest
          no-cache: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.WEB_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.WEB_NEXT_PUBLIC_APP_URL }}
            NEST_API_URL=${{ secrets.NEST_API_URL }}

  build-and-push-admin:
    name: Build & push admin image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required build secrets
        env:
          ADMIN_NEXT_PUBLIC_API_URL: ${{ secrets.ADMIN_NEXT_PUBLIC_API_URL }}
          ADMIN_NEXT_PUBLIC_WEB_URL: ${{ secrets.ADMIN_NEXT_PUBLIC_WEB_URL }}
        run: |
          set -euo pipefail
          required_vars=(
            ADMIN_NEXT_PUBLIC_API_URL
            ADMIN_NEXT_PUBLIC_WEB_URL
          )
          for var in "${required_vars[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required GitHub secret: $var"
              exit 1
            fi
          done

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/admin.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.ADMIN_IMAGE_NAME }}:latest
          no-cache: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.ADMIN_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WEB_URL=${{ secrets.ADMIN_NEXT_PUBLIC_WEB_URL }}

  build-and-push-api:
    name: Build & push api image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:latest
          no-cache: true

  build-and-push-model-api:
    name: Build & push model-api image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push model-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/model-api.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODEL_API_IMAGE_NAME }}:latest
          no-cache: true

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - build-and-push-web
      - build-and-push-admin
      - build-and-push-api
      - build-and-push-model-api

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}

            if [ ! -f .env ]; then
              echo "Missing ${PWD}/.env. Copy .env.example and configure production values before deploy."
              exit 1
            fi

            get_env_value() {
              primary="$1"
              fallback="${2:-}"
              value=$(grep -E "^${primary}=.+" .env | tail -n1 | cut -d= -f2- || true)
              if [ -z "$value" ] && [ -n "$fallback" ]; then
                value=$(grep -E "^${fallback}=.+" .env | tail -n1 | cut -d= -f2- || true)
              fi
              printf '%s' "$value"
            }

            required_env_pairs=(
              "DATABASE_URL"
              "DIRECT_URL"
              "SUPABASE_URL"
              "SUPABASE_SERVICE_ROLE_KEY"
              "SUPABASE_BUCKET_NAME"
              "SUPABASE_PUBLISHABLE_KEY"
              "SUPABASE_SECRET_KEY"
              "JWT_REFRESH_SECRET"
              "JWT_ACCESS_SECRET"
              "GOOGLE_CLIENT_ID"
              "GOOGLE_CLIENT_SECRET"
              "GOOGLE_CALLBACK_URL"
              "FRONTEND_URL"
              "WEB_ORIGINS"
              "WEB_NEXT_PUBLIC_API_URL:NEXT_PUBLIC_API_URL"
              "WEB_NEXT_PUBLIC_APP_URL:NEXT_PUBLIC_APP_URL"
              "ADMIN_NEXT_PUBLIC_API_URL:NEXT_PUBLIC_API_URL"
              "ADMIN_NEXT_PUBLIC_WEB_URL:NEXT_PUBLIC_WEB_URL"
              "NEST_API_URL"
              "MODEL_API_URL"
              "GEMINI_API_KEY"
            )
            for pair in "${required_env_pairs[@]}"; do
              primary="${pair%%:*}"
              fallback=""
              if [ "$pair" != "$primary" ]; then
                fallback="${pair#*:}"
              fi
              value=$(get_env_value "$primary" "$fallback")
              if [ -z "$value" ]; then
                if [ -n "$fallback" ]; then
                  echo "Missing or empty required deploy env in .env: $primary (or fallback $fallback)"
                else
                  echo "Missing or empty required deploy env in .env: $primary"
                fi
                exit 1
              fi
            done

            url_env_pairs=(
              "GOOGLE_CALLBACK_URL"
              "FRONTEND_URL"
              "WEB_NEXT_PUBLIC_API_URL:NEXT_PUBLIC_API_URL"
              "WEB_NEXT_PUBLIC_APP_URL:NEXT_PUBLIC_APP_URL"
              "ADMIN_NEXT_PUBLIC_API_URL:NEXT_PUBLIC_API_URL"
              "ADMIN_NEXT_PUBLIC_WEB_URL:NEXT_PUBLIC_WEB_URL"
              "NEST_API_URL"
              "MODEL_API_URL"
            )
            for pair in "${url_env_pairs[@]}"; do
              primary="${pair%%:*}"
              fallback=""
              if [ "$pair" != "$primary" ]; then
                fallback="${pair#*:}"
              fi
              value=$(get_env_value "$primary" "$fallback")
              if ! printf '%s' "$value" | grep -Eq '^https?://'; then
                if [ -n "$fallback" ]; then
                  echo "Invalid URL format for $primary (or fallback $fallback). Expected http(s)://..."
                else
                  echo "Invalid URL format for $primary. Expected http(s)://..."
                fi
                exit 1
              fi
            done

            git fetch --prune origin main
            git checkout main
            git pull --ff-only origin main

            # Ensure Nginx exists and reverse-proxy config is applied on every deploy.
            if ! command -v nginx >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y nginx
              else
                echo "nginx is not installed and apt-get is unavailable. Install nginx manually once on VPS."
                exit 1
              fi
            fi

            sudo cp infra/nginx/cityfarm.ipv4.http.conf.template /etc/nginx/sites-available/cityfarm-ipv4.conf
            sudo ln -sf /etc/nginx/sites-available/cityfarm-ipv4.conf /etc/nginx/sites-enabled/cityfarm-ipv4.conf
            if [ -f /etc/nginx/sites-enabled/default ]; then
              sudo rm -f /etc/nginx/sites-enabled/default
            fi
            sudo nginx -t
            sudo systemctl enable nginx
            sudo systemctl reload nginx || sudo systemctl restart nginx

            export COMPOSE_PARALLEL_LIMIT=1
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            docker compose -f infra/deploy/docker-compose.vps.yml pull
            docker compose -f infra/deploy/docker-compose.vps.yml config >/dev/null
            docker compose -f infra/deploy/docker-compose.vps.yml up -d --remove-orphans

            wait_for_http() {
              service="$1"
              url="$2"
              for attempt in $(seq 1 60); do
                if curl -sf "$url" >/dev/null 2>&1; then
                  echo "Service $service is ready at $url"
                  return 0
                fi
                sleep 3
              done
              echo "Timed out waiting for $service ($url)"
              docker compose -f infra/deploy/docker-compose.vps.yml logs --tail=100 "$service"
              exit 1
            }

            wait_for_http api http://127.0.0.1:3001/
            wait_for_http web http://127.0.0.1:3000/
            wait_for_http admin http://127.0.0.1:3002/
            wait_for_http nginx http://127.0.0.1/

            docker image prune -f
