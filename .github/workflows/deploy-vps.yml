name: Deploy To VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE_NAME: cityfarm-2-0-web
  ADMIN_IMAGE_NAME: cityfarm-2-0-admin
  API_IMAGE_NAME: cityfarm-2-0-api
  MODEL_API_IMAGE_NAME: cityfarm-2-0-model-api
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/deploy/apps/cityfarm' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check-types

  build-and-push:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: cityfarm-2-0-web
            dockerfile: docker/web.Dockerfile
          - image_name: cityfarm-2-0-admin
            dockerfile: docker/admin.Dockerfile
          - image_name: cityfarm-2-0-api
            dockerfile: docker/api.Dockerfile
          - image_name: cityfarm-2-0-model-api
            dockerfile: docker/model-api.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ matrix.image_name == 'cityfarm-2-0-web' && secrets.WEB_NEXT_PUBLIC_API_URL || matrix.image_name == 'cityfarm-2-0-admin' && secrets.ADMIN_NEXT_PUBLIC_API_URL || '' }}
            NEXT_PUBLIC_APP_URL=${{ matrix.image_name == 'cityfarm-2-0-web' && secrets.WEB_NEXT_PUBLIC_API_URL || '' }}
            NEXT_PUBLIC_WEB_URL=${{ matrix.image_name == 'cityfarm-2-0-admin' && secrets.ADMIN_NEXT_PUBLIC_WEB_URL || '' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            # Clone repo if not present, otherwise sync
            if [ ! -d "${{ env.DEPLOY_PATH }}/.git" ]; then
              mkdir -p "$(dirname ${{ env.DEPLOY_PATH }})"
              git clone https://github.com/${{ github.repository }}.git ${{ env.DEPLOY_PATH }}
            fi
            cd ${{ env.DEPLOY_PATH }}
            git fetch --prune origin main
            git checkout main
            git pull --ff-only origin main

            # Update image tags: strip old lines, append new ones
            grep -v '^\(WEB_IMAGE\|ADMIN_IMAGE\|API_IMAGE\|MODEL_API_IMAGE\)=' .env > .env.tmp && mv .env.tmp .env
            cat >> .env << 'IMGEEOF'
WEB_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}
ADMIN_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.ADMIN_IMAGE_NAME }}:${{ github.sha }}
API_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
MODEL_API_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODEL_API_IMAGE_NAME }}:${{ github.sha }}
IMGEEOF

            # Login GHCR and deploy
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin
            export COMPOSE_PARALLEL_LIMIT=1
            docker compose -f infra/deploy/docker-compose.vps.yml --env-file .env pull
            docker compose -f infra/deploy/docker-compose.vps.yml --env-file .env up -d --remove-orphans

            # Wait for healthchecks
            docker compose -f infra/deploy/docker-compose.vps.yml --env-file .env wait --timeout=120 api
            docker compose -f infra/deploy/docker-compose.vps.yml --env-file .env wait --timeout=60 web

            docker image prune -f
