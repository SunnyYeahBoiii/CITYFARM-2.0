# .github/workflows/deploy.yml
name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  LANDING_IMAGE_NAME: cityfarm-2-0-landing
  WEB_IMAGE_NAME: cityfarm-2-0-web
  ADMIN_IMAGE_NAME: cityfarm-2-0-admin
  API_IMAGE_NAME: cityfarm-2-0-api
  MODEL_API_IMAGE_NAME: cityfarm-2-0-model-api
  DEPLOY_PATH: /root/CITYFARM-2.0

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api run prisma:generate

      - name: Type check
        run: pnpm check-types

      - name: API tests
        run: pnpm --filter api test

      - name: API build
        run: pnpm --filter api build

      - name: URL regression check
        run: pnpm check:url-regressions

  build-and-push-web:
    name: Build & push web image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required build secrets
        env:
          WEB_NEXT_PUBLIC_API_URL: ${{ secrets.WEB_NEXT_PUBLIC_API_URL }}
          WEB_NEXT_PUBLIC_APP_URL: ${{ secrets.WEB_NEXT_PUBLIC_APP_URL }}
          NEST_API_URL: ${{ secrets.NEST_API_URL }}
        run: |
          set -euo pipefail
          required_vars=(
            WEB_NEXT_PUBLIC_API_URL
            WEB_NEXT_PUBLIC_APP_URL
            NEST_API_URL
          )
          for var in "${required_vars[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required GitHub secret: $var"
              exit 1
            fi
          done

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.WEB_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.WEB_NEXT_PUBLIC_APP_URL }}
            NEST_API_URL=${{ secrets.NEST_API_URL }}

  build-and-push-landing:
    name: Build & push landing image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push landing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/landing.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.LANDING_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.LANDING_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-admin:
    name: Build & push admin image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required build secrets
        env:
          ADMIN_NEXT_PUBLIC_API_URL: ${{ secrets.ADMIN_NEXT_PUBLIC_API_URL }}
          ADMIN_NEXT_PUBLIC_WEB_URL: ${{ secrets.ADMIN_NEXT_PUBLIC_WEB_URL }}
        run: |
          set -euo pipefail
          required_vars=(
            ADMIN_NEXT_PUBLIC_API_URL
            ADMIN_NEXT_PUBLIC_WEB_URL
          )
          for var in "${required_vars[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required GitHub secret: $var"
              exit 1
            fi
          done

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/admin.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.ADMIN_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.ADMIN_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.ADMIN_NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WEB_URL=${{ secrets.ADMIN_NEXT_PUBLIC_WEB_URL }}

  build-and-push-api:
    name: Build & push api image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-model-api:
    name: Build & push model-api image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push model-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/model-api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODEL_API_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.MODEL_API_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - build-and-push-landing
      - build-and-push-web
      - build-and-push-admin
      - build-and-push-api
      - build-and-push-model-api

    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Prepare deploy path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "${{ env.DEPLOY_PATH }}/infra/deploy" "${{ env.DEPLOY_PATH }}/infra/nginx"

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/deploy/docker-compose.vps.yml,infra/nginx/cityfarm.http.conf.template,infra/nginx/cityfarm.https.conf.template"
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          MODEL_API_GCP_PROJECT_ID: ${{ secrets.MODEL_API_GCP_PROJECT_ID }}
          MODEL_API_GCP_LOCATION: ${{ secrets.MODEL_API_GCP_LOCATION }}
          MODEL_API_GCP_API_KEY: ${{ secrets.MODEL_API_GCP_API_KEY }}
          MODEL_API_GCP_KEY_FILE_ON_VPS: ${{ secrets.MODEL_API_GCP_KEY_FILE_ON_VPS || vars.MODEL_API_GCP_KEY_FILE_ON_VPS }}
          MODEL_API_SECRET_KEY_JSON: ${{ secrets.MODEL_API_SECRET_KEY_JSON }}
          MODEL_API_SECRET_KEY_JSON_B64: ${{ secrets.MODEL_API_SECRET_KEY_JSON_B64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: MODEL_API_GCP_PROJECT_ID,MODEL_API_GCP_LOCATION,MODEL_API_GCP_API_KEY,MODEL_API_GCP_KEY_FILE_ON_VPS,MODEL_API_SECRET_KEY_JSON,MODEL_API_SECRET_KEY_JSON_B64
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"

            required_model_api_secrets=(
              MODEL_API_GCP_PROJECT_ID
              MODEL_API_GCP_LOCATION
            )
            for var in "${required_model_api_secrets[@]}"; do
              if [ -z "${!var:-}" ]; then
                echo "Missing required GitHub secret for deploy: $var"
                exit 1
              fi
            done

            touch .env

            upsert_env() {
              key="$1"
              value="$2"
              python3 - "$key" "$value" <<'PY'
            import pathlib
            import sys

            key = sys.argv[1]
            value = sys.argv[2]
            env_path = pathlib.Path(".env")
            lines = env_path.read_text(encoding="utf-8").splitlines() if env_path.exists() else []
            prefix = f"{key}="

            for idx, line in enumerate(lines):
                if line.startswith(prefix):
                    lines[idx] = f"{key}={value}"
                    break
            else:
                lines.append(f"{key}={value}")

            env_path.write_text("\n".join(lines).rstrip("\n") + "\n", encoding="utf-8")
            PY
            }

            IMAGE_OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
            IMAGE_TAG="${{ github.sha }}"
            LANDING_IMAGE_REF="${{ env.REGISTRY }}/${IMAGE_OWNER}/${{ env.LANDING_IMAGE_NAME }}:${IMAGE_TAG}"
            WEB_IMAGE_REF="${{ env.REGISTRY }}/${IMAGE_OWNER}/${{ env.WEB_IMAGE_NAME }}:${IMAGE_TAG}"
            ADMIN_IMAGE_REF="${{ env.REGISTRY }}/${IMAGE_OWNER}/${{ env.ADMIN_IMAGE_NAME }}:${IMAGE_TAG}"
            API_IMAGE_REF="${{ env.REGISTRY }}/${IMAGE_OWNER}/${{ env.API_IMAGE_NAME }}:${IMAGE_TAG}"
            MODEL_API_IMAGE_REF="${{ env.REGISTRY }}/${IMAGE_OWNER}/${{ env.MODEL_API_IMAGE_NAME }}:${IMAGE_TAG}"

            upsert_env "LANDING_IMAGE" "$LANDING_IMAGE_REF"
            upsert_env "WEB_IMAGE" "$WEB_IMAGE_REF"
            upsert_env "ADMIN_IMAGE" "$ADMIN_IMAGE_REF"
            upsert_env "API_IMAGE" "$API_IMAGE_REF"
            upsert_env "MODEL_API_IMAGE" "$MODEL_API_IMAGE_REF"

            MODEL_API_GCP_KEY_FILE_ON_VPS_VALUE="${MODEL_API_GCP_KEY_FILE_ON_VPS:-/root/CITYFARM-2.0/secret-key.json}"
            MODEL_API_GOOGLE_APPLICATION_CREDENTIALS_VALUE="/run/secrets/gcp-service-account.json"
            upsert_env "GCP_PROJECT_ID" "$MODEL_API_GCP_PROJECT_ID"
            upsert_env "GCP_LOCATION" "$MODEL_API_GCP_LOCATION"
            upsert_env "GCP_API_KEY" "${MODEL_API_GCP_API_KEY:-}"
            upsert_env "MODEL_API_GCP_KEY_FILE_ON_VPS" "$MODEL_API_GCP_KEY_FILE_ON_VPS_VALUE"
            upsert_env "MODEL_API_GOOGLE_APPLICATION_CREDENTIALS" "$MODEL_API_GOOGLE_APPLICATION_CREDENTIALS_VALUE"

            install_model_api_key() {
              if [ -z "${MODEL_API_SECRET_KEY_JSON_B64:-}" ] && [ -z "${MODEL_API_SECRET_KEY_JSON:-}" ]; then
                return 1
              fi

              tmp_key_file="$(mktemp)"
              if [ -n "${MODEL_API_SECRET_KEY_JSON_B64:-}" ]; then
                printf '%s' "$MODEL_API_SECRET_KEY_JSON_B64" | base64 -d > "$tmp_key_file"
              else
                printf '%s' "$MODEL_API_SECRET_KEY_JSON" > "$tmp_key_file"
              fi

              sudo install -d -m 700 "$(dirname "$MODEL_API_GCP_KEY_FILE_ON_VPS_VALUE")"
              sudo install -m 600 "$tmp_key_file" "$MODEL_API_GCP_KEY_FILE_ON_VPS_VALUE"
              rm -f "$tmp_key_file"
            }

            if ! install_model_api_key; then
              if ! sudo test -r "$MODEL_API_GCP_KEY_FILE_ON_VPS_VALUE"; then
                echo "Missing Model API service-account key. Set MODEL_API_SECRET_KEY_JSON_B64, MODEL_API_SECRET_KEY_JSON, or provision $MODEL_API_GCP_KEY_FILE_ON_VPS_VALUE on the VPS."
                exit 1
              fi
            fi

            sudo python3 - "$MODEL_API_GCP_KEY_FILE_ON_VPS_VALUE" "$MODEL_API_GCP_PROJECT_ID" <<'PY'
            import json
            import pathlib
            import sys

            path = pathlib.Path(sys.argv[1])
            expected_project = sys.argv[2]
            with path.open("r", encoding="utf-8") as f:
                data = json.load(f)

            if data.get("type") != "service_account":
                raise SystemExit("Model API key JSON is not a service-account credential")

            if expected_project and data.get("project_id") != expected_project:
                raise SystemExit("Model API key JSON project_id does not match MODEL_API_GCP_PROJECT_ID")
            PY

            get_env_value() {
              primary="$1"
              fallback="${2:-}"
              value=$(grep -E "^${primary}=.+" .env | tail -n1 | cut -d= -f2- || true)
              if [ -z "$value" ] && [ -n "$fallback" ]; then
                value=$(grep -E "^${fallback}=.+" .env | tail -n1 | cut -d= -f2- || true)
              fi
              printf '%s' "$value"
            }

            required_env_pairs=(
              "LANDING_IMAGE"
              "WEB_IMAGE"
              "ADMIN_IMAGE"
              "API_IMAGE"
              "MODEL_API_IMAGE"
              "DATABASE_URL"
              "DIRECT_URL"
              "SUPABASE_URL"
              "SUPABASE_SERVICE_ROLE_KEY"
              "SUPABASE_BUCKET_NAME"
              "SUPABASE_PUBLISHABLE_KEY"
              "SUPABASE_SECRET_KEY"
              "JWT_REFRESH_SECRET"
              "JWT_ACCESS_SECRET"
              "GOOGLE_CLIENT_ID"
              "GOOGLE_CLIENT_SECRET"
              "GOOGLE_CALLBACK_URL"
              "FRONTEND_URL"
              "WEB_ORIGINS"
              "WEB_NEXT_PUBLIC_API_URL:NEXT_PUBLIC_API_URL"
              "WEB_NEXT_PUBLIC_APP_URL:NEXT_PUBLIC_APP_URL"
              "ADMIN_NEXT_PUBLIC_API_URL:NEXT_PUBLIC_API_URL"
              "ADMIN_NEXT_PUBLIC_WEB_URL:NEXT_PUBLIC_WEB_URL"
              "NEST_API_URL"
              "MODEL_API_URL"
              "GCP_PROJECT_ID"
              "GCP_LOCATION"
              "MODEL_API_GCP_KEY_FILE_ON_VPS"
              "MODEL_API_GOOGLE_APPLICATION_CREDENTIALS"
            )
            for pair in "${required_env_pairs[@]}"; do
              primary="${pair%%:*}"
              fallback=""
              if [ "$pair" != "$primary" ]; then
                fallback="${pair#*:}"
              fi
              value=$(get_env_value "$primary" "$fallback")
              if [ -z "$value" ]; then
                if [ -n "$fallback" ]; then
                  echo "Missing or empty required deploy env in .env: $primary (or fallback $fallback)"
                else
                  echo "Missing or empty required deploy env in .env: $primary"
                fi
                exit 1
              fi
            done

            url_env_pairs=(
              "GOOGLE_CALLBACK_URL"
              "FRONTEND_URL"
              "WEB_NEXT_PUBLIC_API_URL:NEXT_PUBLIC_API_URL"
              "WEB_NEXT_PUBLIC_APP_URL:NEXT_PUBLIC_APP_URL"
              "ADMIN_NEXT_PUBLIC_API_URL:NEXT_PUBLIC_API_URL"
              "ADMIN_NEXT_PUBLIC_WEB_URL:NEXT_PUBLIC_WEB_URL"
              "NEST_API_URL"
              "MODEL_API_URL"
            )
            for pair in "${url_env_pairs[@]}"; do
              primary="${pair%%:*}"
              fallback=""
              if [ "$pair" != "$primary" ]; then
                fallback="${pair#*:}"
              fi
              value=$(get_env_value "$primary" "$fallback")
              if ! printf '%s' "$value" | grep -Eq '^https?://'; then
                if [ -n "$fallback" ]; then
                  echo "Invalid URL format for $primary (or fallback $fallback). Expected http(s)://..."
                else
                  echo "Invalid URL format for $primary. Expected http(s)://..."
                fi
                exit 1
              fi
            done

            # Canonicalize public URL envs so docker compose always receives
            # ADMIN_*/WEB_* values even when operators still use legacy NEXT_PUBLIC_* keys.
            export WEB_NEXT_PUBLIC_API_URL="$(get_env_value WEB_NEXT_PUBLIC_API_URL NEXT_PUBLIC_API_URL)"
            export WEB_NEXT_PUBLIC_APP_URL="$(get_env_value WEB_NEXT_PUBLIC_APP_URL NEXT_PUBLIC_APP_URL)"
            export ADMIN_NEXT_PUBLIC_API_URL="$(get_env_value ADMIN_NEXT_PUBLIC_API_URL NEXT_PUBLIC_API_URL)"
            export ADMIN_NEXT_PUBLIC_WEB_URL="$(get_env_value ADMIN_NEXT_PUBLIC_WEB_URL NEXT_PUBLIC_WEB_URL)"
            export LANDING_IMAGE="$(get_env_value LANDING_IMAGE)"
            export WEB_IMAGE="$(get_env_value WEB_IMAGE)"
            export ADMIN_IMAGE="$(get_env_value ADMIN_IMAGE)"
            export API_IMAGE="$(get_env_value API_IMAGE)"
            export MODEL_API_IMAGE="$(get_env_value MODEL_API_IMAGE)"
            export MODEL_API_GCP_KEY_FILE_ON_VPS="$(get_env_value MODEL_API_GCP_KEY_FILE_ON_VPS)"
            export MODEL_API_GOOGLE_APPLICATION_CREDENTIALS="$(get_env_value MODEL_API_GOOGLE_APPLICATION_CREDENTIALS)"

            # Ensure Nginx exists and reverse-proxy config is applied on every deploy.
            if ! command -v nginx >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y nginx
              else
                echo "nginx is not installed and apt-get is unavailable. Install nginx manually once on VPS."
                exit 1
              fi
            fi

            if ! command -v envsubst >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y gettext-base
              else
                echo "envsubst is missing and apt-get is unavailable. Install gettext-base manually once on VPS."
                exit 1
              fi
            fi

            if ! command -v certbot >/dev/null 2>&1; then
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y certbot python3-certbot-nginx
              else
                echo "certbot is missing and apt-get is unavailable. Install certbot manually once on VPS."
                exit 1
              fi
            fi

            extract_host_from_url() {
              value="$1"
              value="${value#http://}"
              value="${value#https://}"
              value="${value%%/*}"
              value="${value%%:*}"
              printf '%s' "$value"
            }

            APP_DOMAIN="$(extract_host_from_url "$WEB_NEXT_PUBLIC_APP_URL")"
            if [ -z "$APP_DOMAIN" ]; then
              echo "Unable to derive APP_DOMAIN from WEB_NEXT_PUBLIC_APP_URL"
              exit 1
            fi
            export APP_DOMAIN

            APP_SCHEME="${WEB_NEXT_PUBLIC_APP_URL%%://*}"
            case "$APP_SCHEME" in
              http|https) ;;
              *)
                echo "Unsupported WEB_NEXT_PUBLIC_APP_URL scheme: $APP_SCHEME"
                exit 1
                ;;
            esac

            configure_http_site() {
              envsubst '${APP_DOMAIN}' < infra/nginx/cityfarm.http.conf.template | sudo tee /etc/nginx/sites-available/cityfarm.conf >/dev/null
              sudo ln -sf /etc/nginx/sites-available/cityfarm.conf /etc/nginx/sites-enabled/cityfarm.conf
              if [ -f /etc/nginx/sites-enabled/default ]; then
                sudo rm -f /etc/nginx/sites-enabled/default
              fi
              sudo nginx -t
              sudo systemctl enable nginx
              sudo systemctl reload nginx || sudo systemctl restart nginx
            }

            configure_https_site() {
              export CERT_FULLCHAIN_PATH="/etc/letsencrypt/live/${APP_DOMAIN}/fullchain.pem"
              export CERT_PRIVKEY_PATH="/etc/letsencrypt/live/${APP_DOMAIN}/privkey.pem"
              envsubst '${APP_DOMAIN} ${CERT_FULLCHAIN_PATH} ${CERT_PRIVKEY_PATH}' < infra/nginx/cityfarm.https.conf.template | sudo tee /etc/nginx/sites-available/cityfarm.conf >/dev/null
              sudo ln -sf /etc/nginx/sites-available/cityfarm.conf /etc/nginx/sites-enabled/cityfarm.conf
              if [ -f /etc/nginx/sites-enabled/default ]; then
                sudo rm -f /etc/nginx/sites-enabled/default
              fi
              sudo nginx -t
              sudo systemctl enable nginx
              sudo systemctl reload nginx || sudo systemctl restart nginx
            }

            # Apply HTTP config first so ACME challenge can be served.
            configure_http_site

            SHOULD_TRY_HTTPS=false
            if [ "$APP_SCHEME" = "https" ]; then
              SHOULD_TRY_HTTPS=true
            fi

            if [ "$SHOULD_TRY_HTTPS" = true ]; then
              LETSENCRYPT_EMAIL="$(get_env_value LETSENCRYPT_EMAIL)"
              if [ -z "$LETSENCRYPT_EMAIL" ]; then
                LETSENCRYPT_EMAIL="admin@${APP_DOMAIN}"
              fi
              sudo mkdir -p /var/www/certbot

              sudo certbot certonly \
                --webroot \
                -w /var/www/certbot \
                -d "$APP_DOMAIN" \
                --non-interactive \
                --agree-tos \
                --email "$LETSENCRYPT_EMAIL" \
                --keep-until-expiring

              if [ -f "/etc/letsencrypt/live/${APP_DOMAIN}/fullchain.pem" ] && [ -f "/etc/letsencrypt/live/${APP_DOMAIN}/privkey.pem" ]; then
                configure_https_site
              else
                echo "HTTPS requested but TLS certificate files are missing for domain: $APP_DOMAIN"
                exit 1
              fi
            fi

            export COMPOSE_PARALLEL_LIMIT=1
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            docker compose -f infra/deploy/docker-compose.vps.yml config >/dev/null
            docker compose -f infra/deploy/docker-compose.vps.yml pull

            if docker compose -f infra/deploy/docker-compose.vps.yml run --rm --no-deps api sh -lc 'test -d prisma/migrations && find prisma/migrations -mindepth 1 -maxdepth 1 -type d | grep -q .'; then
              docker compose -f infra/deploy/docker-compose.vps.yml run --rm --no-deps -e DATABASE_URL="$(get_env_value DIRECT_URL)" api pnpm run prisma:migrate:deploy
            else
              echo "No committed Prisma migration directories found in the API image; skipping prisma:migrate:deploy."
            fi

            docker compose -f infra/deploy/docker-compose.vps.yml up -d --remove-orphans

            wait_for_http() {
              service="$1"
              url="$2"
              shift 2
              for attempt in $(seq 1 60); do
                if curl -sf "$@" "$url" >/dev/null 2>&1; then
                  echo "Service $service is ready at $url"
                  return 0
                fi
                sleep 3
              done
              echo "Timed out waiting for $service ($url)"
              docker compose -f infra/deploy/docker-compose.vps.yml logs --tail=100 "$service"
              exit 1
            }

            wait_for_container_healthy() {
              service="$1"
              for attempt in $(seq 1 60); do
                container_id="$(docker compose -f infra/deploy/docker-compose.vps.yml ps -q "$service")"
                if [ -n "$container_id" ]; then
                  health_status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id" 2>/dev/null || true)"
                  if [ "$health_status" = "healthy" ] || [ "$health_status" = "running" ]; then
                    echo "Container $service is $health_status"
                    return 0
                  fi
                fi
                sleep 3
              done
              echo "Timed out waiting for container health: $service"
              docker compose -f infra/deploy/docker-compose.vps.yml logs --tail=100 "$service"
              exit 1
            }

            wait_for_container_healthy model-api
            wait_for_http api http://127.0.0.1:3001/ready
            wait_for_http web http://127.0.0.1:3000/
            wait_for_http landing http://127.0.0.1:3004/landing
            wait_for_http admin http://127.0.0.1:3002/admin
            wait_for_http nginx http://127.0.0.1/ -H "Host: $APP_DOMAIN"

            docker image prune -f
