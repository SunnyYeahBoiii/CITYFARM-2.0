# docker-compose.vps.yml
services:
  landing:
    image: ${LANDING_IMAGE:?LANDING_IMAGE is required}
    restart: unless-stopped
    env_file: ../../.env
    environment:
      PORT: "3004"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3004"
    ports:
      - "${LANDING_BIND_IP:-127.0.0.1}:3004:3004"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3004/landing').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    env_file: ../../.env
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: "${WEB_NEXT_PUBLIC_API_URL}"
      NEXT_PUBLIC_APP_URL: "${WEB_NEXT_PUBLIC_APP_URL}"
      NEST_API_URL: "${NEST_API_URL}"
    expose:
      - "3000"
    ports:
      - "${WEB_BIND_IP:-127.0.0.1}:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  admin:
    image: ${ADMIN_IMAGE:?ADMIN_IMAGE is required}
    restart: unless-stopped
    env_file: ../../.env
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: "${ADMIN_NEXT_PUBLIC_API_URL}"
      NEXT_PUBLIC_WEB_URL: "${ADMIN_NEXT_PUBLIC_WEB_URL}"
    expose:
      - "3000"
    ports:
      - "${ADMIN_BIND_IP:-127.0.0.1}:3002:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/admin').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    env_file: ../../.env
    environment:
      PORT: "3001"
    expose:
      - "3001"
    ports:
      - "${API_BIND_IP:-127.0.0.1}:3001:3001"
    depends_on:
      model-api:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/ready').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  model-api:
    image: ${MODEL_API_IMAGE:?MODEL_API_IMAGE is required}
    restart: unless-stopped
    env_file: ../../.env
    environment:
      PORT: "3003"
      GOOGLE_APPLICATION_CREDENTIALS: "${MODEL_API_GOOGLE_APPLICATION_CREDENTIALS:-/run/secrets/gcp-service-account.json}"
    expose:
      - "3003"
    volumes:
      - ${MODEL_API_GCP_KEY_FILE_ON_VPS:-/etc/cityfarm/model-api/gcp-service-account.json}:${MODEL_API_GOOGLE_APPLICATION_CREDENTIALS:-/run/secrets/gcp-service-account.json}:ro
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3003/ready')"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  app-net:
    driver: bridge
