# docker-compose.vps.yml
services:
  web:
    image: ghcr.io/sunnyyeahboiii/cityfarm-2-0-web:latest
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  admin:
    image: ghcr.io/sunnyyeahboiii/cityfarm-2-0-admin:latest
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  api:
    image: ghcr.io/sunnyyeahboiii/cityfarm-2-0-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3001"
    expose:
      - "3001"
    depends_on:
      - model-api
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  model-api:
    image: ghcr.io/sunnyyeahboiii/cityfarm-2-0-model-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3003"
    expose:
      - "3003"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3003/')"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  app-net:
    driver: bridge
